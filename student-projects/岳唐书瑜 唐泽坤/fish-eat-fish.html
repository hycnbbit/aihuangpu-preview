<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大鱼吃小鱼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #001a33;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  #game-container {
    position: relative;
    width: 100%;
    max-width: 900px;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,100,200,0.5);
    cursor: none;
  }
  #hud {
    position: absolute;
    top: 16px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  .hud-item {
    background: rgba(0,20,50,0.6);
    color: #7dd3fc;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(125,211,252,0.3);
  }
  .hud-item .label { font-size: 12px; color: #94a3b8; display: block; }
  .hud-item .value { font-size: 20px; }
  #score .value { color: #fbbf24; }
  #level .value { color: #4ade80; }

  /* Start screen */
  #start-screen, #gameover-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,10,30,0.85);
    border-radius: 12px;
    z-index: 20;
    backdrop-filter: blur(6px);
  }
  #gameover-screen { display: none; }
  .title {
    font-size: 48px;
    color: #38bdf8;
    text-shadow: 0 0 30px rgba(56,189,248,0.6);
    margin-bottom: 8px;
    font-weight: 800;
    letter-spacing: 4px;
  }
  .subtitle {
    font-size: 16px;
    color: #94a3b8;
    margin-bottom: 30px;
  }
  .instructions {
    color: #cbd5e1;
    font-size: 14px;
    line-height: 2;
    text-align: center;
    margin-bottom: 30px;
    max-width: 380px;
  }
  .instructions .key {
    display: inline-block;
    background: rgba(56,189,248,0.2);
    border: 1px solid rgba(56,189,248,0.4);
    padding: 2px 10px;
    border-radius: 6px;
    color: #38bdf8;
    font-weight: bold;
    margin: 0 2px;
  }
  .btn {
    background: linear-gradient(135deg, #0ea5e9, #2563eb);
    color: white;
    border: none;
    padding: 14px 48px;
    font-size: 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 2px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(14,165,233,0.4);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(14,165,233,0.6); }
  .btn:active { transform: translateY(0); }
  .final-score {
    font-size: 22px;
    color: #fbbf24;
    margin-bottom: 10px;
  }
  .final-level {
    font-size: 16px;
    color: #4ade80;
    margin-bottom: 24px;
  }

  /* Level up flash */
  #level-flash {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    color: #4ade80;
    font-weight: 800;
    text-shadow: 0 0 30px rgba(74,222,128,0.8);
    opacity: 0;
    pointer-events: none;
    z-index: 15;
    transition: opacity 0.3s;
  }
  #level-flash.show {
    animation: levelFlash 1.2s ease-out;
  }
  @keyframes levelFlash {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.5); }
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="900" height="600"></canvas>

  <div id="hud">
    <div class="hud-item" id="score">
      <span class="label">得分</span>
      <span class="value" id="score-val">0</span>
    </div>
    <div class="hud-item" id="level">
      <span class="label">等级</span>
      <span class="value" id="level-val">1</span>
    </div>
  </div>

  <div id="level-flash">升级!</div>

  <div id="start-screen">
    <div class="title">大鱼吃小鱼</div>
    <div class="subtitle">Fish Eating Game</div>
    <div class="instructions">
      移动鼠标控制你的鱼游动<br>
      吃掉比你<span style="color:#4ade80">小</span>的鱼来成长<br>
      避开比你<span style="color:#f87171">大</span>的鱼<br>
      吃到金色小鱼可获得额外分数
    </div>
    <button class="btn" id="start-btn">开始游戏</button>
  </div>

  <div id="gameover-screen">
    <div class="title" style="color:#f87171;font-size:40px">游戏结束</div>
    <div class="final-score" id="final-score">得分：0</div>
    <div class="final-level" id="final-level">最高等级：1</div>
    <button class="btn" id="restart-btn">再来一局</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ---- Game State ----
let gameState = 'menu'; // 'menu', 'playing', 'gameover'
let score = 0;
let level = 1;
let fishEaten = 0;
let fishEatenForLevel = 0;
let player = null;
let fishes = [];
let particles = [];
let bubbles = [];
let mouseX = W / 2, mouseY = H / 2;

// ---- Fish types config ----
// size: radius, color, speed multiplier, score value
const FISH_TYPES = [
  // Tier 1 - smallest (player can eat from start)
  { size: 12, color: '#fcd34d', speed: 1.8, score: 5, tail: '#f59e0b', golden: true },
  { size: 14, color: '#fb923c', speed: 1.5, score: 3, tail: '#ea580c' },
  { size: 16, color: '#f87171', speed: 1.4, score: 2, tail: '#dc2626' },
  { size: 18, color: '#c084fc', speed: 1.3, score: 2, tail: '#9333ea' },
  // Tier 2 - medium
  { size: 22, color: '#60a5fa', speed: 1.2, score: 5, tail: '#2563eb' },
  { size: 26, color: '#34d399', speed: 1.1, score: 8, tail: '#059669' },
  { size: 30, color: '#22d3ee', speed: 1.0, score: 12, tail: '#0891b2' },
  // Tier 3 - large (dangerous)
  { size: 36, color: '#64748b', speed: 0.9, score: 20, tail: '#334155' },
  { size: 42, color: '#475569', speed: 0.85, score: 30, tail: '#1e293b' },
  { size: 50, color: '#334155', speed: 0.8, score: 50, tail: '#0f172a' },
];

// ---- Player ----
class Player {
  constructor() {
    this.x = W / 2;
    this.y = H / 2;
    this.size = 22; // start size
    this.speed = 4;
    this.dir = 1; // 1 = right, -1 = left
    this.angle = 0;
    this.wagPhase = 0;
    this.invincible = 0;
  }

  update() {
    const dx = mouseX - this.x;
    const dy = mouseY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 2) {
      const moveSpeed = Math.min(this.speed, dist * 0.15);
      this.x += (dx / dist) * moveSpeed;
      this.y += (dy / dist) * moveSpeed;
      this.angle = Math.atan2(dy, dx);
      if (dx > 0) this.dir = 1;
      else if (dx < 0) this.dir = -1;
    }

    // Keep in bounds
    this.x = Math.max(this.size, Math.min(W - this.size, this.x));
    this.y = Math.max(this.size, Math.min(H - this.size, this.y));

    this.wagPhase += 0.2;
    if (this.invincible > 0) this.invincible--;
  }

  draw() {
    drawFish(this.x, this.y, this.size, '#fbbf24', '#d97706', this.dir, this.wagPhase, this.angle, this.invincible > 0 && this.invincible % 6 < 3);
  }
}

// ---- Enemy / Food Fish ----
class Fish {
  constructor(typeIdx) {
    this.type = FISH_TYPES[typeIdx];
    this.size = this.type.size;
    this.dir = Math.random() < 0.5 ? 1 : -1;
    this.x = this.dir > 0 ? -this.size : W + this.size;
    this.y = Math.random() * (H - 100) + 50;
    this.vx = this.dir * this.type.speed * (0.8 + Math.random() * 0.6);
    this.vy = (Math.random() - 0.5) * 0.5;
    this.wagPhase = Math.random() * Math.PI * 2;
    this.alive = true;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.wagPhase += 0.15;

    // Vertical wobble
    this.vy += (Math.random() - 0.5) * 0.05;
    this.vy = Math.max(-1, Math.min(1, this.vy));

    // Bounce off top/bottom
    if (this.y < this.size) { this.y = this.size; this.vy = Math.abs(this.vy); }
    if (this.y > H - this.size) { this.y = H - this.size; this.vy = -Math.abs(this.vy); }

    // Remove if off screen
    if (this.x < -this.size * 2 || this.x > W + this.size * 2) {
      this.alive = false;
    }
  }

  draw() {
    drawFish(this.x, this.y, this.size, this.type.color, this.type.tail, this.dir, this.wagPhase, 0, false, this.type.golden);
  }
}

// ---- Draw a fish ----
function drawFish(x, y, size, color, tailColor, dir, wagPhase, angle = 0, blink = false, golden = false) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir, 1);

  // Golden glow
  if (golden) {
    ctx.shadowColor = '#fcd34d';
    ctx.shadowBlur = 15;
  }

  const wag = Math.sin(wagPhase) * 0.3;

  // Tail
  ctx.fillStyle = tailColor;
  ctx.beginPath();
  ctx.moveTo(-size * 0.6, 0);
  ctx.lineTo(-size * 1.3, -size * 0.6 + wag * size);
  ctx.lineTo(-size * 1.1, 0);
  ctx.lineTo(-size * 1.3, size * 0.6 + wag * size);
  ctx.closePath();
  ctx.fill();

  // Body (ellipse)
  const grad = ctx.createLinearGradient(0, -size, 0, size);
  grad.addColorStop(0, lightenColor(color, 30));
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, darkenColor(color, 20));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Top fin
  ctx.fillStyle = tailColor;
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, -size * 0.5);
  ctx.lineTo(0, -size * 0.9 + wag * 5);
  ctx.lineTo(size * 0.3, -size * 0.4);
  ctx.closePath();
  ctx.fill();

  // Bottom fin
  ctx.beginPath();
  ctx.moveTo(-size * 0.1, size * 0.4);
  ctx.lineTo(size * 0.2, size * 0.7 + wag * 3);
  ctx.lineTo(size * 0.3, size * 0.4);
  ctx.closePath();
  ctx.fill();

  // Eye
  if (!blink) {
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(size * 0.45, -size * 0.15, size * 0.18, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(size * 0.5, -size * 0.15, size * 0.1, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(size * 0.53, -size * 0.18, size * 0.04, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mouth
  ctx.strokeStyle = darkenColor(color, 30);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(size * 0.7, size * 0.05);
  ctx.lineTo(size * 0.9, size * 0.1);
  ctx.stroke();

  ctx.restore();
}

function lightenColor(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + percent);
  const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
  const b = Math.min(255, (num & 0x0000FF) + percent);
  return `rgb(${r},${g},${b})`;
}

function darkenColor(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - percent);
  const g = Math.max(0, ((num >> 8) & 0x00FF) - percent);
  const b = Math.max(0, (num & 0x0000FF) - percent);
  return `rgb(${r},${g},${b})`;
}

// ---- Particles (eating effect) ----
class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 6;
    this.vy = (Math.random() - 0.5) * 6;
    this.life = 30;
    this.maxLife = 30;
    this.size = Math.random() * 4 + 2;
    this.color = color;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.95;
    this.vy *= 0.95;
    this.life--;
  }
  draw() {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ---- Bubbles (background decoration) ----
class Bubble {
  constructor() {
    this.reset();
    this.y = Math.random() * H;
  }
  reset() {
    this.x = Math.random() * W;
    this.y = H + 10;
    this.size = Math.random() * 5 + 2;
    this.speed = Math.random() * 1 + 0.5;
    this.wobble = Math.random() * Math.PI * 2;
  }
  update() {
    this.y -= this.speed;
    this.wobble += 0.05;
    this.x += Math.sin(this.wobble) * 0.5;
    if (this.y < -10) this.reset();
  }
  draw() {
    ctx.strokeStyle = 'rgba(125,211,252,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(125,211,252,0.1)';
    ctx.fill();
  }
}

// ---- Background ----
function drawBackground() {
  // Ocean gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0c4a6e');
  grad.addColorStop(0.5, '#075985');
  grad.addColorStop(1, '#0c1e3e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Light rays
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#7dd3fc';
  for (let i = 0; i < 4; i++) {
    const x = (W / 4) * i + Math.sin(Date.now() * 0.0003 + i) * 30;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + 80, 0);
    ctx.lineTo(x + 140, H);
    ctx.lineTo(x + 20, H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Seaweed at bottom
  ctx.save();
  ctx.fillStyle = 'rgba(20,83,45,0.4)';
  for (let i = 0; i < 12; i++) {
    const baseX = (W / 12) * i + 20;
    const sway = Math.sin(Date.now() * 0.001 + i * 0.5) * 8;
    ctx.beginPath();
    ctx.moveTo(baseX, H);
    ctx.quadraticCurveTo(baseX + sway, H - 40, baseX + sway * 1.5, H - 70);
    ctx.quadraticCurveTo(baseX + sway, H - 40, baseX + 5, H);
    ctx.fill();
  }
  ctx.restore();
}

// ---- Spawning ----
let spawnTimer = 0;
function spawnFish() {
  spawnTimer++;
  const spawnRate = Math.max(40, 80 - level * 5);
  if (spawnTimer >= spawnRate && fishes.length < 20) {
    spawnTimer = 0;
    // Determine which fish types can spawn based on player size
    let maxTypeIdx = 0;
    for (let i = FISH_TYPES.length - 1; i >= 0; i--) {
      if (FISH_TYPES[i].size < player.size * 1.8) {
        maxTypeIdx = i + 2; // allow some bigger fish
        break;
      }
    }
    maxTypeIdx = Math.min(maxTypeIdx, FISH_TYPES.length - 1);

    // Weighted random: more small fish, fewer big ones
    const weights = [];
    for (let i = 0; i <= maxTypeIdx; i++) {
      weights.push(Math.max(1, 10 - i * 1.5));
    }
    const totalWeight = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * totalWeight;
    let typeIdx = 0;
    for (let i = 0; i < weights.length; i++) {
      r -= weights[i];
      if (r <= 0) { typeIdx = i; break; }
    }

    // 10% chance for golden fish
    if (Math.random() < 0.08 && player.size > 18) {
      typeIdx = 0; // golden small fish
    }

    fishes.push(new Fish(typeIdx));
  }
}

// ---- Collision ----
function checkCollisions() {
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    if (!f.alive) continue;

    const dx = f.x - player.x;
    const dy = f.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < player.size * 0.7 + f.size * 0.7) {
      if (f.size < player.size * 0.92) {
        // Player eats fish
        eatFish(f);
        fishes.splice(i, 1);
      } else if (f.size > player.size * 1.1 && player.invincible <= 0) {
        // Big fish eats player
        gameOver();
        return;
      }
    }
  }
}

function eatFish(f) {
  const points = f.type.score + level;
  score += points;
  fishEaten++;
  fishEatenForLevel++;

  // Grow
  const growth = f.type.golden ? 3 : Math.max(0.5, f.size * 0.08);
  player.size = Math.min(120, player.size + growth);

  // Particles
  for (let i = 0; i < 12; i++) {
    particles.push(new Particle(f.x, f.y, f.type.color));
  }

  // Check level up
  const fishNeeded = 5 + level * 2;
  if (fishEatenForLevel >= fishNeeded) {
    levelUp();
  }

  updateHUD();
}

function levelUp() {
  level++;
  fishEatenForLevel = 0;
  player.speed = Math.min(6, 4 + level * 0.2);
  player.invincible = 60;

  // Show flash
  const flash = document.getElementById('level-flash');
  flash.classList.remove('show');
  void flash.offsetWidth; // reflow
  flash.classList.add('show');

  // Level up particles
  for (let i = 0; i < 20; i++) {
    const p = new Particle(player.x, player.y, '#4ade80');
    p.vx *= 2;
    p.vy *= 2;
    p.life = 50;
    p.maxLife = 50;
    particles.push(p);
  }

  updateHUD();
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
}

// ---- Game Over ----
function gameOver() {
  gameState = 'gameover';
  // Big particle burst
  for (let i = 0; i < 30; i++) {
    particles.push(new Particle(player.x, player.y, '#f87171'));
  }
  document.getElementById('final-score').textContent = `得分：${score}`;
  document.getElementById('final-level').textContent = `最高等级：${level}`;
  setTimeout(() => {
    document.getElementById('gameover-screen').style.display = 'flex';
  }, 500);
}

// ---- Init / Reset ----
function initGame() {
  player = new Player();
  fishes = [];
  particles = [];
  score = 0;
  level = 1;
  fishEaten = 0;
  fishEatenForLevel = 0;
  spawnTimer = 0;

  // Initial bubbles
  bubbles = [];
  for (let i = 0; i < 25; i++) {
    bubbles.push(new Bubble());
  }

  // Spawn some initial fish
  for (let i = 0; i < 6; i++) {
    const f = new Fish(Math.floor(Math.random() * 4));
    f.x = Math.random() * W;
    fishes.push(f);
  }

  updateHUD();
}

// ---- Main Loop ----
function gameLoop() {
  drawBackground();

  // Bubbles always animate
  for (const b of bubbles) {
    b.update();
    b.draw();
  }

  if (gameState === 'playing') {
    // Spawn
    spawnFish();

    // Update fish
    for (const f of fishes) f.update();
    fishes = fishes.filter(f => f.alive);

    // Player
    player.update();
    checkCollisions();

    // Draw fish (sorted by size, smaller first so big ones overlap)
    fishes.sort((a, b) => a.size - b.size);
    for (const f of fishes) f.draw();

    // Draw player
    player.draw();
  } else if (gameState === 'gameover') {
    // Still draw remaining fish
    for (const f of fishes) { f.update(); f.draw(); }
    fishes = fishes.filter(f => f.alive);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  requestAnimationFrame(gameLoop);
}

// ---- Input ----
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const touch = e.touches[0];
  mouseX = (touch.clientX - rect.left) * scaleX;
  mouseY = (touch.clientY - rect.top) * scaleY;
}, { passive: false });

// ---- Buttons ----
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  initGame();
  gameState = 'playing';
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('gameover-screen').style.display = 'none';
  initGame();
  gameState = 'playing';
});

// Start the loop
gameLoop();
</script>
</body>
</html>
