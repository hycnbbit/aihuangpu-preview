<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>三晋行 · 山西文旅闯关（北→南 · 综合版）</title>
<style>
  :root{
    --paper:#f1e7d0; --paper2:#f7f0e1; --ink:#332e26; --ink-soft:#6f6657;
    --jade:#3a5d6e; --jade-deep:#274554; --vermillion:#9e2b25; --gold:#c79a3e; --line:#c7bb9e;
    --ink-line:#5a5043;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;}
  *:focus{outline:none!important;}
  html,body{margin:0;height:100%;}
  body{font-family:"Songti SC","STSong","SimSun","Noto Serif CJK SC",serif;
    background:#e5eaed;color:var(--ink);display:flex;justify-content:center;align-items:flex-start;min-height:100%;}
  #app{width:100%;max-width:480px;min-height:100vh;background:var(--paper);position:relative;overflow:hidden;}
  .pad{padding:18px 18px 30px;}
  .fade{animation:fade .5s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .panel.flash{animation:flash .5s ease;}
  @keyframes flash{0%{background:rgba(63,98,83,.18);}100%{background:rgba(255,255,255,.6);}}
  button{font-family:inherit;cursor:pointer;border:none;outline:none;}
  .btn{display:inline-block;padding:12px 24px;border-radius:30px;background:var(--jade);color:#f7f0e1;border:1.5px solid var(--jade-deep);box-shadow:0 3px 8px rgba(39,69,84,.28);
    font-size:15px;letter-spacing:2px;box-shadow:0 3px 8px rgba(39,69,84,.28);transition:transform .15s;border:none;outline:none;
    position:relative;z-index:3;pointer-events:auto;cursor:pointer;}
  .btn:active{transform:scale(.96);}
  .btn.hollow{background:transparent;color:var(--jade-deep);border:1.5px solid var(--jade);box-shadow:none;}
  .btn.red{background:var(--vermillion);box-shadow:0 3px 8px rgba(158,43,37,.3);border:1.5px solid #7d211c;}
  .btn:disabled{opacity:.45;box-shadow:none;}

  .topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 14px;background:linear-gradient(90deg,var(--jade),var(--jade-deep));color:#f5efe2;}
  .topbar .brand{font-weight:800;letter-spacing:2px;font-size:15px;flex-shrink:0;}
  .topbar .hud{font-size:12px;font-weight:700;display:flex;gap:10px;align-items:center;}
  .topbar .hud b{color:#ffe6b8;}
  .topbar .pkbtn{font-size:12px;border:1.5px solid #f5efe2;background:transparent;color:#f5efe2;padding:4px 10px;border-radius:16px;}

  .title-wrap{text-align:center;padding:34px 14px 24px;}
  .en{font-size:12px;letter-spacing:4px;color:var(--ink-soft);}
  .big{font-size:40px;letter-spacing:8px;color:var(--vermillion);font-weight:800;margin:8px 0 4px;}
  .ty{font-size:17px;letter-spacing:4px;color:var(--jade-deep);font-weight:700;}
  .sub{font-size:13px;color:var(--ink-soft);margin-top:16px;line-height:1.9;}
  .tr-wrap{display:inline-block;}
  .tr-ico{width:64px;height:84px;}

  .qbar{height:8px;background:rgba(255,255,255,.55);border-radius:8px;overflow:hidden;margin:10px 0 14px;}
  .qbar>div{height:100%;background:linear-gradient(90deg,var(--gold),var(--vermillion));transition:width .35s;}

  .banner{height:120px;border-radius:12px;border:1.5px solid var(--line);background-size:cover;background-position:center;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(51,46,38,.15);}
  .banner .cap{position:absolute;left:14px;bottom:10px;font-size:21px;font-weight:800;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.55);letter-spacing:2px;}
  .banner .lv{position:absolute;right:14px;bottom:10px;font-size:12px;color:#fff;background:rgba(0,0,0,.4);padding:2px 10px;border-radius:12px;}
  .story{font-size:14px;line-height:1.9;color:var(--ink-soft);margin-bottom:12px;background:rgba(255,255,255,.55);padding:11px 13px;border-radius:10px;}
  .panel{background:rgba(255,252,245,.7);border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.85;margin-bottom:14px;}
  .panel .pt{color:var(--vermillion);font-weight:600;display:block;margin-bottom:4px;letter-spacing:1px;}
  .row{display:grid;grid-template-columns:auto 1fr;gap:14px;margin-top:18px;width:100%;border:none;align-items:center;}

  .q{font-size:16px;font-weight:600;line-height:1.65;margin-bottom:14px;background:rgba(255,252,245,.9);padding:12px 14px;border-radius:10px;border:2px solid var(--line);color:var(--ink);}
  .opt{display:flex;gap:10px;align-items:center;width:100%;text-align:left;padding:12px 14px;border:2px solid var(--line);border-radius:10px;background:#fff;margin-bottom:10px;font-size:15px;cursor:pointer;font-family:inherit;}
  .opt .ok{width:24px;height:24px;flex:0 0 24px;border-radius:6px;background:var(--paper2);display:grid;place-items:center;font-weight:800;color:var(--ink-soft);font-size:13px;}
  .opt.sel{border-color:var(--vermillion);background:rgba(181,64,47,.06);}
  .opt.ok{border-color:var(--jade);background:rgba(63,98,83,.1);}
  .opt.no{border-color:var(--vermillion);background:rgba(181,64,47,.1);}
  .opt.ok .ok{background:var(--jade);color:#fff;}
  .opt.disabled{pointer-events:none;}
  .stepinfo{font-size:12px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:1px;}

  .slots{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .slot{flex:1;min-width:58px;height:46px;border:2px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-soft);background:rgba(255,255,255,.45);text-align:center;padding:4px;}
  .slot.full{border-style:solid;border-color:var(--jade);color:var(--ink);background:rgba(63,98,83,.1);}
  .src{display:flex;gap:8px;flex-wrap:wrap;}
  .src button{padding:10px 12px;border:1.5px solid var(--jade);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;}

  .cols{display:flex;gap:14px;}
  .col{flex:1;min-width:0;}
  .col .h{font-size:13px;color:var(--ink-soft);margin-bottom:6px;text-align:center;letter-spacing:1px;}
  .tile{padding:12px 8px;border:1.5px solid var(--line);border-radius:8px;background:#fff;margin-bottom:8px;font-size:14px;cursor:pointer;text-align:center;}
  .tile.sel{border-color:var(--vermillion);background:rgba(181,64,47,.06);}
  .tile.matched{border-color:var(--jade);background:rgba(63,98,83,.12);color:var(--jade-deep);}
  .tile.dim{opacity:.55;}

  .luban-frame{margin-top:4px;}
  .luban-frame .ft{font-size:13px;color:var(--ink-soft);margin-bottom:10px;text-align:center;line-height:1.6;}
  .luban-frame.all .ft{color:var(--jade-deep);font-weight:600;}
  .luban-core{position:relative;width:240px;height:240px;margin:0 auto;}
  .luban-core .slot{position:absolute;border:2px dashed var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.4);overflow:hidden;}
  .luban-core .slot .glyph{position:absolute;left:50%;top:50%;width:64px;}
  .luban-core .slot .ph{position:relative;font-size:11px;color:var(--ink-soft);z-index:2;background:rgba(255,255,255,.7);padding:0 4px;border-radius:6px;}
  .luban-core .slot.done{border-style:solid;border-color:var(--jade);background:rgba(63,98,83,.06);}
  .luban-core .slot.done .ph{color:var(--jade-deep);}
  .luban-core .slot.wrong{border-color:var(--vermillion);animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .luban-tray{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px;}
  .luban-tray .piece{width:84px;border:1.5px solid var(--line);border-radius:8px;padding:6px;background:#fff;cursor:grab;text-align:center;touch-action:none;user-select:none;}
  .luban-tray .piece .glyph{width:64px;margin:0 auto;}
  .luban-tray .piece .nm{font-size:11px;margin-top:4px;color:var(--ink-soft);}
  .luban-tray .piece:active{cursor:grabbing;}
  .ghost{position:fixed;z-index:99;pointer-events:none;width:84px;transform:translate(-50%,-50%);opacity:.92;}
  .ghost .glyph{width:64px;margin:0 auto;}
  .ghost .nm{font-size:11px;text-align:center;color:#fff;background:rgba(46,74,62,.85);border-radius:6px;margin-top:2px;}

  .journey{position:relative;padding-left:34px;margin-top:8px;}
  .journey::before{content:"";position:absolute;left:11px;top:8px;bottom:8px;width:3px;background:linear-gradient(var(--jade),var(--gold));border-radius:2px;}
  .jtop{display:flex;gap:12px;align-items:center;margin-bottom:8px;}
  .jtitle{font-size:19px;letter-spacing:3px;color:var(--vermillion);font-weight:700;}
  .jsub{font-size:12px;color:var(--ink-soft);}
  .jregion{margin:16px 0 6px -34px;font-size:13px;letter-spacing:5px;color:var(--vermillion);font-weight:600;}
  .jregion::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--vermillion);display:inline-block;margin-right:6px;vertical-align:middle;}
  .stop{position:relative;display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:8px;border:2px solid var(--line);border-radius:12px;background:rgba(255,252,245,.6);cursor:pointer;}
  .stop.locked{opacity:.5;filter:grayscale(.4);cursor:not-allowed;}
  .stop.cleared{border-color:var(--jade);background:rgba(63,98,83,.08);}
  .stop.frontier{box-shadow:0 0 0 2px var(--vermillion);border-color:var(--vermillion);}
  .stop .dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--line);flex:0 0 12px;}
  .stop.cleared .dot{background:var(--jade);border-color:var(--jade);}
  .stop .no{width:30px;height:30px;border-radius:50%;background:var(--vermillion);color:#fff;font-size:14px;display:grid;place-items:center;flex:0 0 30px;}
  .stop.cleared .no{background:var(--jade);}
  .stop .info{flex:1;min-width:0;}
  .stop .nm{font-weight:700;font-size:15px;}
  .stop .ti{font-size:12px;color:var(--ink-soft);}
  .stop .st{font-size:16px;}
  .stop .rg{font-size:10px;margin-left:6px;padding:1px 6px;border-radius:10px;background:var(--gold);color:#fff;letter-spacing:0;}
  .stop .flag{position:absolute;right:10px;top:-11px;background:var(--vermillion);color:#fff;font-size:11px;padding:1px 8px;border-radius:10px;}

  .ending{text-align:center;padding:30px 14px;}
  .seal-stamp{width:80px;height:80px;border:3px solid var(--vermillion);border-radius:10px;color:var(--vermillion);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;margin:0 auto 14px;transform:rotate(-6deg);}
  .scroll{font-size:14px;line-height:2;letter-spacing:1px;max-width:330px;margin:10px auto;}
  .scroll.small{font-size:12px;color:var(--ink-soft);}

  /* 山西地图（表里山河长卷） */
  .sx-banner{text-align:center;font-weight:800;font-size:15px;color:#fff;background:linear-gradient(90deg,var(--vermillion),var(--gold));
    border-radius:14px;padding:10px 14px;margin:4px 0 6px;letter-spacing:1px;box-shadow:0 4px 14px rgba(158,43,37,.25);}
  .sxmap{position:relative;width:100%;max-width:560px;margin:14px auto 0;aspect-ratio:1000/760;}
  .sxmap svg{position:absolute;inset:0;width:100%;height:100%;filter:drop-shadow(0 6px 14px rgba(91,122,58,.3));}
  .sxpin{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;z-index:2;}
  .sxpin .badge{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:18px;
    background:var(--vermillion);border:2.5px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.25);transition:transform .12s;}
  .sxpin.cleared .badge{background:var(--jade);}
  .sxpin.cleared{animation:floaty 2.6s ease-in-out infinite;}
  .sxpin.locked{opacity:.45;filter:grayscale(.6);cursor:not-allowed;}
  .sxpin.locked .badge{background:#b3ac9c;border-color:#e9e3d4;}
  .sxpin .lbl{font-size:10px;margin-top:2px;color:var(--ink);background:rgba(255,255,255,.82);border-radius:6px;
    padding:0 4px;white-space:nowrap;font-weight:700;line-height:1.5;border:1px solid rgba(0,0,0,.06);}
  .sxpin:not(.locked):active .badge{transform:scale(.9);}
  @keyframes floaty{0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-50%,calc(-50% - 5px));}}

  /* PK */
  .pk-title{text-align:center;font-size:22px;letter-spacing:3px;color:var(--vermillion);font-weight:700;margin-bottom:4px;}
  .pk-sub{text-align:center;font-size:13px;color:var(--ink-soft);margin-bottom:14px;}
  .form-row{margin:14px 0;text-align:left;}
  .form-row label{display:block;font-weight:800;font-size:14px;margin-bottom:6px;color:var(--ink-soft);}
  .pk-input{font-family:inherit;font-size:15px;padding:10px 12px;border:2px solid var(--line);border-radius:10px;width:100%;text-align:center;font-weight:700;background:#fff;}
  .seg{display:inline-flex;border:2px solid var(--line);border-radius:30px;overflow:hidden;}
  .seg button{border:none;background:#fff;font-family:inherit;font-weight:800;padding:8px 16px;cursor:pointer;color:var(--ink-soft);font-size:14px;}
  .seg button.on{background:var(--gold);color:#fff;}
  .center{text-align:center;}
  .vscard{flex:1;min-width:140px;background:rgba(255,255,255,.6);border:2px solid var(--line);border-radius:16px;padding:16px;margin:6px;}
  .vscard.a{border-color:#3a5d6e;} .vscard.b{border-color:#9e2b25;}
  .vs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .vs .pn{font-weight:900;font-size:16px;} .vs .ps{font-size:40px;font-weight:900;margin-top:6px;} .vs .pc{font-size:12px;color:var(--ink-soft);}
  .pkwin{text-align:center;font-size:24px;font-weight:900;color:var(--vermillion);margin:16px 0;letter-spacing:2px;}
  .split-top{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px;font-weight:700;}
  .split-panels{display:flex;gap:0;margin-top:8px;}
  .spanel{flex:1;padding:0 8px;min-width:0;}
  .spanel-div{width:2px;background:var(--line);margin:0 4px;flex:0 0 2px;}
  .phead{font-weight:900;font-size:14px;text-align:center;margin-bottom:8px;color:var(--vermillion);}
  .pq{font-size:14px;font-weight:700;line-height:1.5;background:rgba(255,252,245,.9);border:2px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px;min-height:58px;}
  .sopts{display:grid;gap:8px;}
  .sopt{display:flex;gap:8px;align-items:center;background:#fff;border:2px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;}
  .sopt .ok{width:22px;height:22px;flex:0 0 22px;border-radius:6px;background:var(--paper2);display:grid;place-items:center;font-weight:800;color:var(--ink-soft);font-size:12px;}
  .sopt.correct{border-color:var(--jade);background:rgba(63,98,83,.1);}
  .sopt.correct .ok{background:var(--jade);color:#fff;}
  .sopt.wrong{border-color:var(--vermillion);background:rgba(181,64,47,.1);}
  .sopt.disabled{pointer-events:none;}
  .pcol-status{text-align:center;margin-top:8px;font-weight:800;min-height:18px;font-size:13px;}
  .pcol-status.ok{color:var(--jade);} .pcol-status.no{color:var(--vermillion);}
  .feedback{margin-top:8px;background:rgba(255,255,255,.7);border-left:3px solid var(--gold);border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.7;color:var(--ink-soft);display:none;}
  .feedback.show{display:block;}
  .split-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}

  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:var(--vermillion);color:#fff;padding:11px 22px;border-radius:30px;font-weight:800;font-size:14px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99;transition:.4s;opacity:0;pointer-events:none;letter-spacing:1px;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>

  citywall:`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400' preserveAspectRatio='xMidYMax slice'>

/* ============ 关卡内：多步 steps ============ */
let RT={};
function buildSteps(L){
  const steps=[];
  (L.quiz||[]).forEach(q=>steps.push({t:"q",q:q.q,o:q.o,a:q.a,e:q.e}));
  if(L.mech==="luban") steps.push({t:"luban"});
  else if(L.mech==="match") steps.push({t:"match"});
  else if(L.mech==="order") steps.push({t:"order"});
  return steps;
}
function playLevel(i){
  const L=LEVELS[i];
  RT={i, steps:buildSteps(L), stepIdx:0, locked:false,
      sel:null, optOrder:null, picked:[], matched:{}, matchedR:{}, selLeft:null,
      placed:{}, tray:null, rot:{}, placedRot:{}, matchedAll:false};

  $("submit").onclick=()=>checkStep(L);

function updateBar(){
  const total=RT.steps.length;
  const pct = total? Math.round((RT.stepIdx)/total*100) : 0;
  const bar=$("bar"); if(bar) bar.style.width=pct+"%";
  const sb=$("stepinfo"); if(sb) sb.textContent=`第 ${Math.min(RT.stepIdx+1,total)} / ${total} 步`;
}
function setSubmit(text,disabled){ const b=$("submit"); if(b){ b.textContent=text; b.disabled=!!disabled; } }
function setPanel(prefix,body,kind){
  const p=$("panel");
  const color = kind==="ok" ? "var(--jade-deep)" : kind==="no" ? "var(--vermillion)" : "var(--vermillion)";

function refreshHUD(){
  const hud=document.querySelector(".topbar .hud");
  if(hud) hud.innerHTML=`已通关 <b>${clearedN()}</b>/${LEVELS.length} · 🪙 ${STATE.score}`;

function renderStep(L){
  const st=RT.steps[RT.stepIdx];
  const info=`<div class="stepinfo" id="stepinfo">第 ${RT.stepIdx+1} / ${RT.steps.length} 步${st.t==="q"?" · 单选":st.t==="luban"?" · 鲁班锁":st.t==="match"?" · 配对":st.t==="order"?" · 排序":""}</div>`;
  if(st.t==="q") renderQuiz(st);
  else if(st.t==="order") renderOrder(L);
  else if(st.t==="match") renderMatch(L);
  else if(st.t==="luban") renderLuban(L);
  // 在 mech 前插入步骤信息
  const mech=$("mech");
  mech.insertAdjacentHTML("afterbegin", info);
  updateBar();
  if(st.t!=="q") setSubmit("确认作答", false);
}

/* ---- 单选步骤 ---- */
function renderQuiz(st){
  if(!RT.optOrder) RT.optOrder = shuffle(st.o.map((_,k)=>k));
  const keys=["A","B","C","D","E"];
  const html = `<div class="q">${st.q}</div>` + RT.optOrder.map((k,i)=>
    `<button class="opt" data-k="${k}"><span class="ok">${keys[i]}</span><span>${st.o[k]}</span></button>`).join("");
  $("mech").innerHTML=html;
  document.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>{ if(RT.locked) return;
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); RT.sel=+b.dataset.k; };
  });
}
/* ---- 排序步骤 ---- */
function renderOrder(L){
  if(RT.srcOrder===undefined) RT.srcOrder = shuffle(L.items.map((_,k)=>k));
  const slotHtml=L.items.map((_,k)=>{
    const v=RT.picked[k];
    return `<div class="slot ${v!=null?'full':''}">${v!=null?L.items[v]:'第'+(k+1)+'序'}</div>`;
  }).join("");
  const srcHtml=RT.srcOrder.map(k=>`<button data-k="${k}" ${RT.picked.includes(k)?'disabled':''}>${L.items[k]}</button>`).join("");
  $("mech").innerHTML=`<div class="slots">${slotHtml}</div><div class="src">${srcHtml}</div>`;
  document.querySelectorAll(".src button").forEach(b=>{
    b.onclick=()=>{ if(RT.picked.length<L.items.length){ RT.picked.push(+b.dataset.k); renderOrder(L); } };
  });
}
/* ---- 配对步骤 ---- */
function renderMatch(L){
  if(!RT.leftOrder) RT.leftOrder = shuffle(L.left.map((_,k)=>k));
  if(!RT.rightOrder) RT.rightOrder = shuffle(L.right.map((_,k)=>k));
  const leftHtml=RT.leftOrder.map(k=>`<div class="tile ${RT.matched[k]?'matched dim':''}" data-k="${k}">${L.left[k]}</div>`).join("");
  const rightHtml=RT.rightOrder.map(k=>`<div class="tile ${RT.matchedR&&RT.matchedR[k]?'matched dim':''}" data-r="${k}">${L.right[k]}</div>`).join("");
  if(!RT.matchedR) RT.matchedR={};
  $("mech").innerHTML=`<div class="cols"><div class="col"><div class="h">构件</div>${leftHtml}</div>
    <div class="col"><div class="h">功能</div>${rightHtml}</div></div>`;
  document.querySelectorAll(".col:first-child .tile").forEach(t=>{
    t.onclick=()=>{ const k=+t.dataset.k; if(RT.matched[k])return;
      document.querySelectorAll(".col:first-child .tile").forEach(x=>x.classList.remove("sel"));
      t.classList.add("sel"); RT.selLeft=k; };
  });
  document.querySelectorAll(".col:nth-child(2) .tile").forEach(t=>{
    t.onclick=()=>{ const r=+t.dataset.r; if(RT.matchedR[r])return;
      if(RT.selLeft==null){ toast("先点左边的构件"); return; }
      if(L.pairs[RT.selLeft]===r){
        RT.matched[RT.selLeft]=true; RT.matchedR[r]=true;
        const all=Object.keys(L.pairs).every(k=>RT.matched[k]);
        renderMatch(L);
        if(all){ toast("构件归位，规制复原！"); RT.matchedAll=true; setSubmit("确认作答", false); }
      } else { toast("不对，再想想它们的功用"); document.querySelectorAll(".col:first-child .tile").forEach(x=>x.classList.remove("sel")); RT.selLeft=null; }
    };
  });
}
/* ---- 鲁班锁步骤 ---- */
function nameOf(L,key){ const p=L.luban.find(x=>x.key===key); return p?p.name:key; }
function pieceArt(key, mode){
  const g = mode==="wood" ? `<g fill="url(#wood)" stroke="rgba(90,60,20,.45)" stroke-width="1">` : `<g fill="none" stroke="var(--jade-deep)" stroke-width="2">`;
  let inner = `<rect x="4" y="16" width="62" height="15" rx="3"/>`;
  let extra="";
  if(key==="tou") extra = `<rect x="29" y="16" width="12" height="15" rx="1"/>`;
  if(key==="ban") extra = `<path d="M26 16 h18 v-7 h-18 z"/>`;
  if(key==="ge")  extra = `<path d="M4 16 h16 v-9 h-16 z"/>`;
  if(key==="xie") extra = `<path d="M30 16 l7 -9 l7 9 z"/>`;
  if(key==="shi") extra = `<rect x="31" y="5" width="10" height="37" rx="2"/>`;
  if(key==="yan") extra = `<path d="M27 16 l4 -9 h10 l4 9 z"/>`;
  let hole="";
  if(key==="tou" && mode==="wood") hole=`<rect x="29" y="16" width="12" height="15" rx="1" fill="var(--paper)"/>`;
  return `<svg viewBox="0 0 70 44" preserveAspectRatio="xMidYMid meet">${g}${inner}${extra}</g>${hole}</svg>`;
}
function buildGrooves(L){
  const K=L.luban.map(p=>p.key);
  const H=[{top:55,left:10,w:220,h:30},{top:105,left:10,w:220,h:30},{top:155,left:10,w:220,h:30}];
  const V=[{left:55,top:10,w:30,h:220},{left:105,top:10,w:30,h:220},{left:155,top:10,w:30,h:220}];
  const g=[];
  H.forEach(p=>g.push(Object.assign({key:K[g.length],side:'h',reqRot:0},p)));
  V.forEach(p=>g.push(Object.assign({key:K[g.length],side:'v',reqRot:1},p)));
  return g;
}
function renderLuban(L){
  if(!RT.tray) RT.tray = shuffle(L.luban.map(p=>p.key));
  if(!RT.rot) RT.rot={};
  if(!RT.placedRot) RT.placedRot={};
  RT.grooves = buildGrooves(L);
  const all = Object.keys(RT.placed).length === L.luban.length;
  RT.matchedAll = all;
  const slots = RT.grooves.map((g,i)=>{
    const done = RT.placed[i]!=null;
    const key = RT.placed[i];
    const rot = done ? (RT.placedRot[i]||g.reqRot) : g.reqRot;
    const inner = done
      ? `<div class="glyph" style="transform:translate(-50%,-50%) rotate(${rot*90}deg)">${pieceArt(key,'wood')}</div><div class="ph">${nameOf(L,key)}</div>`
      : `<div class="glyph" style="transform:translate(-50%,-50%) rotate(${g.reqRot*90}deg);opacity:.25">${pieceArt(g.key,'outline')}</div><span class="ph">榫卯</span>`;
    return `<div class="slot ${done?'done':''}" data-slot="${i}" style="left:${g.left}px;top:${g.top}px;width:${g.w}px;height:${g.h}px">${inner}</div>`;
  }).join("");
  const tray = RT.tray.map(key=>`<div class="piece" data-key="${key}"><div class="glyph" style="transform:rotate(${(RT.rot[key]||0)*90}deg)">${pieceArt(key,'wood')}</div><div class="nm">${nameOf(L,key)}</div></div>`).join("");
  $("mech").innerHTML = `
    <div class="luban-frame ${all?'all':''}"><div class="ft">${all?'✦ 榫卯合龙 ✦':'把构件拼入鲁班锁骨架 · 拖动就位，点构件可调朝向'}</div>
    <div class="luban-core">${slots}</div></div>
    <div class="luban-tray" id="tray">${tray}</div>`;
  setSubmit("确认作答", !all);
  bindLuban(L);
}
function bindLuban(L){
  document.querySelectorAll(".piece").forEach(p=>{ p.addEventListener("pointerdown", ev=>startDrag(ev, L, p)); });
  document.querySelectorAll(".slot.done").forEach(s=>{
    s.onclick=()=>{ const idx=+s.dataset.slot; const key=RT.placed[idx]; delete RT.placed[idx]; delete RT.placedRot[idx]; RT.tray.push(key); renderLuban(L); };
  });
}
let drag=null;
function startDrag(ev, L, el){
  ev.preventDefault();
  const key=el.dataset.key;
  drag={key, el, ghost:document.createElement("div"), startX:ev.clientX, startY:ev.clientY};
  drag.ghost.className="ghost";
  const rot=RT.rot[key]||0;
  drag.ghost.innerHTML=`<div class="glyph" style="transform:rotate(${rot*90}deg)">${pieceArt(key,'wood')}</div><div class="nm">${nameOf(L,key)}</div>`;
  document.body.appendChild(drag.ghost);
  el.style.opacity=".35";
  moveGhost(ev);
  window.addEventListener("pointermove", moveGhost);
  window.addEventListener("pointerup", endDrag);
}
function moveGhost(ev){ if(!drag) return; drag.ghost.style.left=ev.clientX+"px"; drag.ghost.style.top=ev.clientY+"px"; }
function wrongSlot(slot){ slot.classList.add("wrong"); setTimeout(()=>slot.classList.remove("wrong"),420); }
function endDrag(ev){
  window.removeEventListener("pointermove", moveGhost);
  window.removeEventListener("pointerup", endDrag);
  if(!drag) return;
  const key=drag.key;
  const moved=Math.hypot(ev.clientX-drag.startX, ev.clientY-drag.startY);
  drag.ghost.remove(); drag=null;
  const L=LEVELS[RT.i];
  if(moved<8){ RT.rot[key]=((RT.rot[key]||0)+1)%4; renderLuban(L); return; }
  const ci=RT.grooves.findIndex(g=>g.key===key);
  const correctSlot=document.querySelector(`[data-slot="${ci}"]`);
  const cr=correctSlot.getBoundingClientRect();
  const inCorrect = ev.clientX>=cr.left && ev.clientX<=cr.right && ev.clientY>=cr.top && ev.clientY<=cr.bottom;
  if(RT.placed[ci]!=null){ toast("这一根已经合上了"); renderLuban(L); return; }
  if(!inCorrect){ wrongSlot(correctSlot); toast("拖到轮廓相符的那根骨架位置"); renderLuban(L); return; }
  if((RT.rot[key]||0)!==RT.grooves[ci].reqRot){ wrongSlot(correctSlot); toast("朝向不对，先点构件旋转调正"); renderLuban(L); return; }
  RT.placed[ci]=key; RT.placedRot[ci]=RT.grooves[ci].reqRot;
  RT.tray=RT.tray.filter(k=>k!==key);
  const tip=L.luban.find(p=>p.key===key).tip;
  $("panel").innerHTML=`<span class="pt">榫卯 · ${nameOf(L,key)}</span>${tip}`;
  if(Object.keys(RT.placed).length===L.luban.length) toast("榫卯合龙！点『确认作答』");
  renderLuban(L);
}

/* ============ 判定当前步 ============ */
function checkStep(L){
  const st=RT.steps[RT.stepIdx];
  if(st.t==="q") checkQuiz(L,st);
  else if(st.t==="order"){
    if(RT.picked.length<L.items.length){ toast("请先排满所有工序"); return; }
    if(JSON.stringify(RT.picked)===JSON.stringify(L.answer)){ stepDone(L); }
    else { toast("次序不对，重新排一次"); RT.picked=[]; renderOrder(L); }
  }
  else if(st.t==="match"){
    if(!RT.matchedAll){ toast("把四件构件都连对才算复原"); return; }
    stepDone(L);
  }
  else if(st.t==="luban"){
    if(!RT.matchedAll){ toast("先把六件构件都合龙"); return; }
    stepDone(L);
  }
}
function checkQuiz(L,st){
  if(RT.locked){ stepDone(L); return; }
  if(RT.sel==null){ toast("请先选择一项"); return; }
  if(RT.sel===st.a){
    RT.locked=true;
    const ok=document.querySelector(`.opt[data-k="${st.a}"]`); if(ok) ok.classList.add("ok");
    STATE.score+=10; STATE.correctTotal++; save(); refreshHUD();
    setPanel("✅ 回答正确 · +10 🪙", st.e, "ok");
    setSubmit("继续 →", false);
  } else {
    const sel=document.querySelector(`.opt[data-k="${RT.sel}"]`); if(sel) sel.classList.add("no");
    const ok=document.querySelector(`.opt[data-k="${st.a}"]`); if(ok) ok.classList.add("ok");
    setPanel("❌ 答错了 · 解析", st.e, "no");
    RT.locked=true;
    setSubmit("继续 →", false);
  }
}
function stepDone(L){
  const last = RT.stepIdx >= RT.steps.length-1;
  if(last){ clearLevel(L); return; }
  RT.stepIdx++; RT.locked=false; RT.sel=null; RT.optOrder=null;
  RT.picked=[]; RT.srcOrder=undefined; RT.matched={}; RT.matchedR={}; RT.selLeft=null;
  RT.placed={}; RT.tray=null; RT.rot={}; RT.placedRot={}; RT.matchedAll=false;
  const p=$("panel"); p.innerHTML=`<span class="pt">提示</span>下一关谜题来了，点「看提示」可求助。`;
  setSubmit("确认作答", false);
  renderStep(L);
}

/* ============ 通关 ============ */
function clearLevel(L){
  STATE.cleared[L.id]=true; save();
  const next=RT.i+1; const last=next>=LEVELS.length;
  setPanel("✦ 通关 ✦", `你解开了「${L.title}」，山河又亮了一处。`, "ok");
  const actions=document.createElement("div");
  actions.className="row"; actions.style.cssText="display:grid;grid-template-columns:auto 1fr;gap:14px;margin-top:18px;width:100%;border:none;";
  actions.innerHTML = last
    ? `<button class="btn red" id="fin" style="width:100%">展开山河长卷</button>`
    : `<button class="btn hollow" id="gates" style="display:inline-block;width:auto;padding:6px 14px;font-size:12px;border-radius:16px;">返回关卡</button><button class="btn red" id="nxt" style="width:100%;box-sizing:border-box;">下一关 →</button>`;
  document.querySelector(".pad").appendChild(actions);
  $("submit").disabled=true; $("hint").disabled=true;
  refreshHUD();
  if(last) $("fin").onclick=showEnding;
  else { $("nxt").onclick=()=>playLevel(next); $("gates").onclick=showGates; }
}
function showEnding(){
  const names=LEVELS.map(L=>L.name).join(" · ");
  const tot=totalQuizSteps();
  const ratio = tot? STATE.correctTotal/tot : 0;
  let rank,word;
  if(STATE.correctTotal===tot){ rank="👑 三晋文旅状元"; word="满分通关！三晋文明尽收眼底，你已是可带团讲解的行走百科。"; }
  else if(ratio>=0.85){ rank="🏅 三晋文旅达人"; word="表现出色！你深谙三晋文化精髓，找个周末真去山西走一遭。"; }
  else if(ratio>=0.6){ rank="🎋 三晋游学之士"; word="不错的成绩！你对山西已有相当积累，再多逛几处便是行家。"; }
  else { rank="🌱 三晋初游客"; word="闯关成功便是缘分！山西的故事还很长，欢迎再来重走一遍。"; }
  app.innerHTML=`<div class="ending fade"><div class="seal-stamp">晋</div>
    <h2 style="font-size:22px;letter-spacing:6px">表里山河长卷</h2>
    <div class="scroll">三十二关皆破。<br/>一位旅人自雁北启程，逐站南下，<br/>以谜题为钥，一一打开了山西的山河：</div>
    <div class="scroll small">${names}</div>
    <div class="scroll" style="color:var(--vermillion)">🪙 金币 ${STATE.score} · ✅ 答对 ${STATE.correctTotal}/${tot}</div>
    <div class="scroll" style="color:var(--gold);font-weight:800;font-size:18px">${rank}</div>
    <div class="scroll">${word}</div>
    <div class="scroll" style="color:var(--vermillion)">地上文物看山西，<br/>一梁一柱皆山河。</div>
    <button class="btn hollow" id="again">重走一遍</button></div>`;
  $("again").onclick=()=>{ STATE.cleared={}; STATE.score=0; STATE.correctTotal=0; save(); showGates(); };
}

/* ============ 双人 PK 对战 ============ */
let PK={};
function allQuizPool(){
  const pool=[];
  LEVELS.forEach(L=>{ (L.quiz||[]).forEach(q=>pool.push(Object.assign({},q,{src:L.name}))); });
  return pool;
}
function showPKSetup(){
  app.innerHTML=`<div class="pad fade">
    <div class="pk-title">⚔️ 双人 PK 对战</div>
    <div class="pk-sub">同设备轮流作答 · 同套题目 · 比分高者胜</div>
    <div style="max-width:420px;margin:0 auto">
      <div class="form-row"><label>🔵 玩家一 昵称</label><input class="pk-input" id="pkNameA" maxlength="8" value="玩家一"></div>
      <div class="form-row"><label>🔴 玩家二 昵称</label><input class="pk-input" id="pkNameB" maxlength="8" value="玩家二"></div>
      <div class="form-row center"><label style="text-align:center">对战题数</label>
        <div class="seg" id="pkSeg"><button data-n="5" onclick="PKsetCount(5,this)">5 题</button><button data-n="10" class="on" onclick="PKsetCount(10,this)">10 题</button><button data-n="15" onclick="PKsetCount(15,this)">15 题</button></div></div>
      <div class="form-row center"><label style="text-align:center">对战方式</label>
        <div class="seg" id="pkModeSeg"><button data-m="turn" onclick="PKsetMode('turn',this)">轮流作答</button><button data-m="split" class="on" onclick="PKsetMode('split',this)">同屏同时</button></div></div>
      <div class="center" style="margin-top:18px">
        <button class="btn" onclick="PKstart()">🔥 开始对战</button>
        <div style="height:10px"></div>
        <button class="btn hollow" onclick="showTitle()">← 返回</button>
      </div>
      <div class="pk-sub" style="font-size:12px;margin-top:16px">「轮流作答」两人各抽不同题；「同屏同时」一块屏幕左右分两区，同一道题两人同时答。</div>
    </div></div>`;
  PK.count=10; PK.mode="split";
}
function PKsetCount(n,el){ PK.count=n; document.querySelectorAll("#pkSeg button").forEach(b=>b.classList.remove("on")); el.classList.add("on"); }
function PKsetMode(m,el){ PK.mode=m; document.querySelectorAll("#pkModeSeg button").forEach(b=>b.classList.remove("on")); el.classList.add("on"); }
function PKstart(){
  const na=$("pkNameA").value.trim()||"玩家一";
  const nb=$("pkNameB").value.trim()||"玩家二";
  const pool=allQuizPool();
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  if(PK.mode==="split"){ PKsplitStart(na,nb,pool); return; }
  PK={active:true,names:[na,nb],total:Math.min(PK.count||10,Math.floor(pool.length/2)),scores:[0,0],perCorrect:[0,0],player:0,qIdx:0,poolA:pool.slice(0,Math.floor(pool.length/2)),poolB:pool.slice(Math.floor(pool.length/2),pool.length)};
  PKshowHandoff();
}
function PKshowHandoff(){
  const p=PK.player; const color=p===0?"🔵":"🔴";
  app.innerHTML=`<div class="pad fade center">
    <div class="tr-wrap" style="margin-bottom:10px">${travelerSVG()}</div>
    <div class="pk-title" style="font-size:26px">${color} ${PK.names[p]}</div>
    <div class="pk-sub">${p===0?"两人题目各不相同，互不干扰，放心作答！":"轮到 "+PK.names[p]+" 啦～两人题目不同，直接开答即可。"}</div>
    <button class="btn" onclick="PKstartBlock()">✅ 开始答题</button>
    <div style="height:10px"></div>
    <button class="btn hollow" onclick="showTitle()">← 返回</button>
  </div>`;
}
function PKstartBlock(){ renderPKQuiz(); }
function PKq(){ return PK.player===0 ? PK.poolA[PK.qIdx] : PK.poolB[PK.qIdx]; }
function renderPKQuiz(){
  const p=PK.player; const q=PKq();
  app.innerHTML=`<div class="topbar">
      <button class="btn red" id="pkBack" style="display:inline-block;width:auto;padding:7px 13px;font-size:12px;border-radius:16px;flex-shrink:0;box-shadow:0 4px 12px rgba(181,64,47,.35);">← 返回</button>
      <div class="brand">${(p===0?"🔵 ":"🔴 ")+PK.names[p]}</div>
      <div class="hud">🪙 ${PK.scores[p]} · 第 ${PK.qIdx+1}/${PK.total} 题</div>
    </div>
    <div class="pad fade">
      <div class="q">${q.q}</div>
      <div id="optsBox"></div>
      <div class="feedback" id="feedback"></div>
      <div class="row"><button class="btn" id="nextBtn" style="width:100%" onclick="PKnext()">继续 →</button></div>
    </div>`;
  const keys=["A","B","C","D","E"];
  const box=$("optsBox");
  q.o.forEach((op,idx)=>{
    const d=document.createElement("button"); d.className="opt"; d.innerHTML=`<span class="ok">${keys[idx]}</span><span>${op}</span>`;
    d.onclick=()=>PKanswer(idx,d);
    box.appendChild(d);
  });
  $("nextBtn").style.display="none";
  $("pkBack").onclick=showTitle;
}
function PKanswer(idx,el){
  const q=PKq();
  document.querySelectorAll(".opt").forEach(o=>o.classList.add("disabled"));
  const fb=$("feedback");
  if(idx===q.a){
    el.classList.add("ok"); PK.scores[PK.player]+=10; PK.perCorrect[PK.player]++;
    toast("答对啦！+10 🪙"); fb.innerHTML="✅ <b>回答正确！</b> "+q.e;
  } else {
    el.classList.add("no");
    const ok=document.querySelectorAll(".opt")[q.a]; if(ok) ok.classList.add("ok");
    fb.innerHTML="❌ <b>答错了。</b> "+q.e;
  }
  fb.classList.add("show");
  $("nextBtn").style.display="block";
}
function PKnext(){
  if(PK.qIdx<PK.total-1){ PK.qIdx++; renderPKQuiz(); }
  else {
    if(PK.player===0){ PK.player=1; PK.qIdx=0; PKshowHandoff(); }
    else PKresult();
  }
}
function PKresult(){
  const a=PK.scores[0], b=PK.scores[1];
  app.innerHTML=`<div class="pad fade center">
    <div class="pk-title">⚔️ 对战结果</div>
    <div class="pkwin">${a>b?"🏆 "+PK.names[0]+" 获胜！":b>a?"🏆 "+PK.names[1]+" 获胜！":"🤝 平局！不分伯仲"}</div>
    <div class="vs">
      <div class="vscard a"><div class="pn">🔵 ${PK.names[0]}</div><div class="ps">${a}</div><div class="pc">答对 ${PK.perCorrect[0]} 题</div></div>
      <div class="vscard b"><div class="pn">🔴 ${PK.names[1]}</div><div class="ps">${b}</div><div class="pc">答对 ${PK.perCorrect[1]} 题</div></div>
    </div>
    <button class="btn" onclick="PKstart()">🔁 再来一局</button>
    <div style="height:10px"></div>
    <button class="btn hollow" onclick="showTitle()">🏠 返回首页</button>
  </div>`;
}
/* ---- 同屏同时（split） ---- */
function PKsplitStart(na,nb,pool){
  const half=Math.floor(pool.length/2);
  PK={mode:"split",names:[na,nb],total:Math.min(PK.count||10,half),idx:0,
      poolA:pool.slice(0,half),poolB:pool.slice(half,half*2),
      p:[{score:0,correct:0,answered:false,choice:-1},{score:0,correct:0,answered:false,choice:-1}]};
  PKrenderSplit();
}
function PKrenderSplit(){
  const s=PK;
  s.p[0].answered=false; s.p[1].answered=false; s.p[0].choice=-1; s.p[1].choice=-1;
  const q1=s.poolA[s.idx], q2=s.poolB[s.idx];
  app.innerHTML=`<div class="topbar">
      <div class="brand">⚔️ 同屏对战</div>
      <div class="hud">第 ${s.idx+1}/${s.total} 题</div>
    </div>
    <div class="pad fade">
      <div class="split-top"><div>🔵 ${s.names[0]} · 🪙 ${s.p[0].score}</div><div>🪙 ${s.p[1].score} · ${s.names[1]} 🔴</div></div>
      <div class="qbar"><div id="splitBar" style="width:${s.idx/s.total*100}%"></div></div>
      <div class="split-panels">
        <div class="spanel"><div class="phead">🔵 ${s.names[0]}</div><div class="pq" id="splitQ1">${q1.q}</div><div class="sopts" id="optsP1"></div><div class="pcol-status" id="stP1"></div><div class="feedback" id="spFb1"></div></div>
        <div class="spanel-div"></div>
        <div class="spanel"><div class="phead">${s.names[1]} 🔴</div><div class="pq" id="splitQ2">${q2.q}</div><div class="sopts" id="optsP2"></div><div class="pcol-status" id="stP2"></div><div class="feedback" id="spFb2"></div></div>
      </div>
      <div class="split-foot"><button class="btn hollow" onclick="showTitle()">← 退出</button><button class="btn hidden" id="splitNext" onclick="PKsplitNext()">下一题 →</button></div>
    </div>`;
  PKbuildCol("optsP1",0,q1); PKbuildCol("optsP2",1,q2);
}
function PKbuildCol(elId,pi,q){
  const el=$(elId); const keys=["A","B","C","D","E"];
  el.innerHTML="";
  q.o.forEach((op,idx)=>{ const d=document.createElement("div"); d.className="sopt"; d.innerHTML=`<span class="ok">${keys[idx]}</span><span>${op}</span>`; d.onclick=()=>PKsplitAnswer(pi,idx,d); el.appendChild(d); });
}
function PKsplitAnswer(pi,idx,el){
  const s=PK; if(s.p[pi].answered) return;
  s.p[pi].answered=true; s.p[pi].choice=idx;
  const q = pi===0 ? s.poolA[s.idx] : s.poolB[s.idx];
  const correct=idx===q.a; s.p[pi].correct=correct; if(correct) s.p[pi].score+=10;
  const opts=el.parentNode.children;
  for(let i=0;i<opts.length;i++) opts[i].classList.add("disabled");
  el.classList.add(correct?"correct":"wrong");
  const okOpt=opts[q.a]; if(okOpt) okOpt.classList.add("correct");
  const st=pi===0?$("stP1"):$("stP2"); st.textContent=correct?"✅ 答对 +10":"❌ 答错"; st.className="pcol-status "+(correct?"ok":"no");
  const fb=pi===0?$("spFb1"):$("spFb2"); fb.innerHTML=(correct?"✅ <b>回答正确！</b> ":"❌ <b>答错了。</b> ")+q.e; fb.classList.add("show");
  if(pi===0) $("splitQ1").parentNode.querySelector(".phead").textContent="🔵 "+s.names[0]+" · 🪙 "+s.p[0].score;
  else $("splitQ2").parentNode.querySelector(".phead").textContent=s.names[1]+" 🔴 · 🪙 "+s.p[1].score;
  if(s.p[0].answered && s.p[1].answered){
    $("splitBar").style.width=((s.idx+1)/s.total*100)+"%";
    $("splitNext").classList.remove("hidden");
    setTimeout(()=>PKsplitNext(),1200);
  }
}
function PKsplitNext(){
  const s=PK;
  if(s.idx<s.total-1){ s.idx++; PKrenderSplit(); }
  else PKsplitResult();
}
function PKsplitResult(){
  const s=PK;
  app.innerHTML=`<div class="pad fade center">
    <div class="pk-title">⚔️ 对战结果</div>
    <div class="pkwin">${s.p[0].score>s.p[1].score?"🏆 "+s.names[0]+" 获胜！":s.p[1].score>s.p[0].score?"🏆 "+s.names[1]+" 获胜！":"🤝 平局！不分伯仲"}</div>
    <div class="vs">
      <div class="vscard a"><div class="pn">🔵 ${s.names[0]}</div><div class="ps">${s.p[0].score}</div><div class="pc">答对 ${Math.round(s.p[0].score/10)} 题</div></div>
      <div class="vscard b"><div class="pn">🔴 ${s.names[1]}</div><div class="ps">${s.p[1].score}</div><div class="pc">答对 ${Math.round(s.p[1].score/10)} 题</div></div>
    </div>
    <button class="btn" onclick="PKstart()">🔁 再来一局</button>
    <div style="height:10px"></div>
    <button class="btn hollow" onclick="showTitle()">🏠 返回首页</button>
  </div>`;
}

/* ============ 启动 ============ */
load();
showTitle();
</script>
</body>
</html>
